<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS - Produto</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

header{
background:black;
padding:20px;
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
letter-spacing:3px;
font-weight:bold;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

img{
width:100%;
border-radius:12px;
}

h1{
margin:15px 0;
}

/* PREÇO ANTIGO */
.old-price{
color:#777;
text-decoration:line-through;
font-size:18px;
margin-top:10px;
}

/* PREÇO NOVO */
.new-price{
color:gold;
font-size:32px;
font-weight:bold;
margin:5px 0 15px;
}

/* BOX INFO */
.box{
background:#141414;
padding:15px;
border-radius:10px;
margin-top:15px;
text-align:left;
}

/* BOTÃO */
.btn{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:gold;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.tag{
display:inline-block;
padding:5px 10px;
background:#222;
border-radius:6px;
font-size:12px;
color:#aaa;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">DH LUPAS</div>
</header>

<div class="container">

<h1 id="nome"></h1>

<img id="img">

<div class="tag">🔥 Oferta limitada</div>

<div class="old-price">de R$ 199,00</div>
<div class="new-price" id="price"></div>

<div class="box">
<h3>🕶️ Detalhes do Produto</h3>
<p>Óculos premium estilo DH LUPAS</p>
<p>Design moderno, leve e confortável</p>
<p>Ideal para uso diário e lifestyle urbano</p>
</div>

<a id="whats" class="btn">
Comprar no WhatsApp
</a>

</div>

<script>

const p = new URLSearchParams(window.location.search);

const nome = p.get("nome");
const img = p.get("img");

document.getElementById("nome").innerText = nome;

document.getElementById("img").src =
"https://picsum.photos/seed/dh" + img + "/600/400";

/* PREÇO DINÂMICO (BELEZA DE LOJA) */
let base = 199;
let desconto = 80 + (img % 3) * 10;

document.getElementById("price").innerText = "por R$ " + desconto.toFixed(2);

/* WHATSAPP */
document.getElementById("whats").href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent(
"Quero comprar: " + nome +
" - De R$199 por R$" + desconto.toFixed(2)
);

</script>

</body>
</html>
