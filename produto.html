<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS - Produto</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

/* HEADER */
header{
background:black;
padding:14px;
font-weight:900;
letter-spacing:3px;
}

/* CONTAINER */
.container{
max-width:600px;
margin:auto;
padding:15px;
}

/* IMAGEM FLUTUANTE */
img{
width:100%;
border-radius:16px;
margin-top:10px;
animation:float 4s ease-in-out infinite;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* NOME */
h2{
margin:10px 0;
}

/* PREÇO */
.price{
font-size:32px;
font-weight:900;
color:gold;
margin:10px 0;
}

/* BOX INFO */
.box{
background:#111;
padding:14px;
border-radius:14px;
margin-top:12px;
text-align:left;
font-size:13px;
}

/* BOTÃO */
.btn{
display:block;
margin-top:18px;
padding:16px;
background:white;
color:black;
font-weight:bold;
border-radius:12px;
text-decoration:none;
font-size:16px;
}

/* ANIMAÇÃO FLUTUAR */
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}
</style>
</head>

<body>

<header>DH LUPAS</header>

<div class="container">

<h2 id="nome"></h2>

<img id="img">

<div class="price" id="price"></div>

<div class="box">
🕶️ Produto premium DH LUPAS<br>
🚚 Entrega 3 a 10 dias úteis<br>
🔒 Compra segura via WhatsApp<br>
⚡ Estilo urbano moderno
</div>

<a id="buy" class="btn">COMPRAR AGORA</a>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

let id = new URLSearchParams(location.search).get("id");

let p = produtos[id];

/* se não existir produto */
if(!p){
document.body.innerHTML = "<h2>Produto não encontrado</h2>";
throw new Error("Sem produto");
}

/* preencher dados */
document.getElementById("nome").innerText = p.nome;
document.getElementById("img").src = p.img;
document.getElementById("price").innerText = "R$ " + p.preco;

/* botão whatsapp */
document.getElementById("buy").onclick = () => {
window.location.href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent(
"🔥 Quero comprar: " + p.nome +
" | Preço: R$ " + p.preco
);
};

</script>

</body>
</html>
