<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS - Produto</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="https://dummyimage.com/64x64/000/ffd700&text=DH">

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
overflow-x:hidden;
}

header{
background:black;
padding:14px;
border-bottom:1px solid #111;
position:sticky;
top:0;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
letter-spacing:4px;
font-weight:900;
color:white;
}

/* 🛒 CARRINHO ICON */
.cart{
cursor:pointer;
font-size:14px;
background:#111;
padding:6px 10px;
border-radius:8px;
}

/* CONTAINER */
.container{
max-width:600px;
margin:auto;
padding:15px;
animation:fadeIn 0.8s ease;
}

/* IMAGEM */
.floating-img{
width:100%;
border-radius:16px;
margin-top:10px;
animation:float 4s ease-in-out infinite;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* TAGS */
.tag{
display:inline-block;
padding:6px 12px;
background:#1a1a1a;
border-radius:20px;
font-size:12px;
color:#aaa;
margin:6px 4px;
}

/* PREÇO */
.old{
color:#666;
text-decoration:line-through;
margin-top:10px;
font-size:15px;
}

.new{
color:white;
font-size:34px;
font-weight:900;
margin:5px 0;
}

/* BOX */
.box{
background:#111;
padding:14px;
border-radius:14px;
margin-top:12px;
text-align:left;
font-size:13px;
}

/* BOTÃO COMPRAR */
.btn{
display:block;
margin-top:18px;
padding:16px;
background:white;
color:black;
text-decoration:none;
border-radius:12px;
font-weight:bold;
font-size:16px;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* BOTÃO CARRINHO (NOVO) */
.cartBtn{
display:block;
margin-top:10px;
padding:16px;
background:gold;
color:black;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

/* ANIMAÇÕES */
@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0px);}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* 🛒 POPUP CARRINHO */
#cartBox{
position:fixed;
top:60px;
right:10px;
background:#111;
padding:15px;
border-radius:12px;
width:250px;
display:none;
z-index:9999;
text-align:left;
}

#cartBox h3{
margin:0 0 10px 0;
}

.item{
font-size:13px;
margin-bottom:8px;
border-bottom:1px solid #222;
padding-bottom:5px;
}
</style>
</head>

<body>

<header>
<div class="logo">DH LUPAS</div>

<div class="cart" onclick="toggleCart()">
🛒 <span id="cartCount">0</span>
</div>
</header>

<!-- 🛒 CARRINHO -->
<div id="cartBox">
<h3>Seu Carrinho</h3>
<div id="cartItems"></div>
</div>

<div class="container">

<h2 id="nome"></h2>

<img id="img" class="floating-img">

<div class="tag">🔥 Mais vendido</div>
<div class="tag">⚡ Oferta especial</div>

<div class="old">de R$ 199,00</div>
<div class="new" id="price"></div>

<div class="box">
<h3>🕶️ Produto Premium</h3>
<p>Design moderno estilo urbano</p>
<p>Acabamento premium DH LUPAS</p>
</div>

<div class="box">
<h3>🚚 Envio</h3>
<p>3 a 10 dias úteis</p>
</div>

<div class="box">
<h3>🔒 Segurança</h3>
<p>Compra segura via WhatsApp</p>
</div>

<a id="buy" class="btn">COMPRAR AGORA</a>

<!-- 🛒 NOVO BOTÃO -->
<div class="cartBtn" onclick="addCart()">ADICIONAR AO CARRINHO</div>

</div>

<script>

const p = new URLSearchParams(window.location.search);

const nome = p.get("nome");
const img = p.get("img");

document.getElementById("nome").innerText = nome;

document.getElementById("img").src =
"https://picsum.photos/seed/dh" + img + "/600/400";

let price = 79 + (img % 4) * 17;

document.getElementById("price").innerText =
"R$ " + price.toFixed(2);

/* WHATSAPP */
document.getElementById("buy").onclick = () => {
window.location.href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent("Quero comprar: " + nome + " por R$ " + price);
};

/* 🛒 CARRINHO */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCart(){
document.getElementById("cartCount").innerText = cart.length;

let box = document.getElementById("cartItems");
box.innerHTML = "";

cart.forEach((item,i)=>{
box.innerHTML += `
<div class="item">
${item.nome} - R$ ${item.preco}
</div>
`;
});
}

function addCart(){
cart.push({
nome:nome,
preco:price
});

localStorage.setItem("cart", JSON.stringify(cart));
updateCart();
alert("Adicionado ao carrinho!");
}

function toggleCart(){
let box = document.getElementById("cartBox");
box.style.display = box.style.display === "block" ? "none" : "block";
}

updateCart();

</script>

</body>
</html>
