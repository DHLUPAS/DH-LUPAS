<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Produto</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

header{
background:black;
padding:14px;
font-weight:900;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

img{
width:100%;
border-radius:14px;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.price{
font-size:30px;
color:gold;
font-weight:900;
}

.btn{
display:block;
margin-top:15px;
padding:15px;
background:white;
color:black;
font-weight:bold;
border-radius:10px;
}
</style>
</head>

<body>

<header>DH LUPAS</header>

<div class="container">

<h2 id="nome"></h2>

<img id="img">

<div class="price" id="price"></div>

<a class="btn" id="buy">COMPRAR AGORA</a>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

let id = new URLSearchParams(location.search).get("id");

let p = produtos[id];

document.getElementById("nome").innerText = p.nome;
document.getElementById("img").src = p.img;
document.getElementById("price").innerText = "R$ " + p.preco;

document.getElementById("buy").onclick = () => {
window.location.href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent("Quero comprar: " + p.nome + " por R$ " + p.preco);
};

</script>

</body>
</html>
