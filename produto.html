<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

header{
background:black;
padding:20px;
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
letter-spacing:3px;
font-weight:bold;
}

.container{
padding:20px;
max-width:700px;
margin:auto;
}

img{
width:100%;
border-radius:12px;
}

h1{
margin:15px 0;
}

.price{
font-size:26px;
color:gold;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:gold;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.box{
background:#141414;
padding:15px;
border-radius:10px;
margin-top:15px;
text-align:left;
}

.cart{
margin-top:20px;
padding:15px;
background:#111;
border-radius:10px;
text-align:left;
}
</style>
</head>

<body>

<header>
<div class="logo">DH LUPAS</div>
</header>

<div class="container">

<h1 id="nome"></h1>

<img id="img">

<p class="price" id="price"></p>

<div class="box">
<h3>🕶️ Detalhes</h3>
<p>Produto premium DH LUPAS</p>
<p>Estilo moderno e confortável</p>
</div>

<div class="btn" onclick="addCart()">
Adicionar ao carrinho
</div>

<div class="cart">
<h3>🛒 Carrinho</h3>
<div id="items"></div>
<p>Total: R$ <span id="total">0</span></p>

<a id="whats" class="btn" style="display:block;text-align:center;">
Finalizar no WhatsApp
</a>
</div>

</div>

<script>

const p = new URLSearchParams(window.location.search);

const nome = p.get("nome");
const img = p.get("img");

document.getElementById("nome").innerText = nome;
document.getElementById("img").src =
"https://picsum.photos/seed/dh" + img + "/600/400";

/* preço fixo */
let preco = 99 + (img % 4) * 25;
document.getElementById("price").innerText = "R$ " + preco;

let cart = [];

function addCart(){
cart.push({nome,preco});
render();
}

function render(){
let html = "";
let total = 0;

cart.forEach(i=>{
html += `<p>${i.nome} - R$ ${i.preco}</p>`;
total += i.preco;
});

document.getElementById("items").innerHTML = html;
document.getElementById("total").innerText = total;

document.getElementById("whats").href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent(
"Quero comprar: " +
cart.map(i=>i.nome+" R$"+i.preco).join(", ") +
" | Total: R$ "+total
);
}

</script>

</body>
</html>
