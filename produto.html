<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

header{
background:black;
padding:15px;
font-size:18px;
font-weight:bold;
}

.container{
padding:15px;
max-width:600px;
margin:auto;
}

img{
width:100%;
border-radius:12px;
}

h1{
font-size:20px;
margin:10px 0;
}

/* PREÇO */
.old{
text-decoration:line-through;
color:#777;
}

.new{
color:gold;
font-size:28px;
font-weight:bold;
}

/* BOX */
.box{
background:#141414;
padding:12px;
border-radius:10px;
margin-top:10px;
text-align:left;
font-size:13px;
}

/* BOTÃO GRANDE MOBILE */
.btn{
display:block;
margin-top:15px;
padding:15px;
background:gold;
color:black;
font-weight:bold;
border-radius:8px;
text-decoration:none;
font-size:16px;
}

</style>
</head>

<body>

<header>DH LUPAS</header>

<div class="container">

<h1 id="nome"></h1>

<img id="img">

<div class="old">de R$ 199</div>
<div class="new" id="price"></div>

<div class="box">
🕶️ Produto premium DH LUPAS<br>
🚚 Envio: 3 a 10 dias úteis<br>
🔒 Compra segura via WhatsApp
</div>

<a id="buy" class="btn">COMPRAR AGORA</a>

</div>

<script>

const p = new URLSearchParams(window.location.search);

const nome = p.get("nome");
const img = p.get("img");

document.getElementById("nome").innerText = nome;

document.getElementById("img").src =
"https://picsum.photos/seed/dh" + img + "/600/400";

let price = 79 + (img % 4) * 15;

document.getElementById("price").innerText =
"por R$ " + price;

document.getElementById("buy").onclick = () => {
window.location.href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent("Quero comprar: " + nome + " por R$ " + price);
};

</script>

</body>
</html>
