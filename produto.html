<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS - Produto</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="https://dummyimage.com/64x64/000/ffd700&text=DH">

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
overflow-x:hidden;
}

/* HEADER CLEAN NIKE STYLE */
header{
background:black;
padding:14px;
border-bottom:1px solid #111;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:20px;
letter-spacing:4px;
font-weight:900;
color:white;
}

/* CONTAINER */
.container{
max-width:600px;
margin:auto;
padding:15px;
}

/* 🖼️ IMAGEM FLUTUANTE */
.floating-img{
width:100%;
border-radius:16px;
margin-top:10px;
animation:float 4s ease-in-out infinite;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* TAGS */
.tag{
display:inline-block;
padding:6px 12px;
background:#1a1a1a;
border-radius:20px;
font-size:12px;
color:#aaa;
margin:6px 4px;
}

/* PREÇO NIKE STYLE */
.old{
color:#666;
text-decoration:line-through;
margin-top:10px;
font-size:15px;
}

.new{
color:white;
font-size:34px;
font-weight:900;
margin:5px 0;
}

/* BOX CLEAN */
.box{
background:#111;
padding:14px;
border-radius:14px;
margin-top:12px;
text-align:left;
font-size:13px;
}

/* BOTÃO PREMIUM */
.btn{
display:block;
margin-top:18px;
padding:16px;
background:white;
color:black;
text-decoration:none;
border-radius:12px;
font-weight:bold;
font-size:16px;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* ✨ ANIMAÇÃO DE FLUTUAR */
@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0px);}
}

/* ENTRADA SUAVE STYLE NIKE */
.container{
animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<div class="logo">DH LUPAS</div>
</header>

<div class="container">

<h2 id="nome"></h2>

<img id="img" class="floating-img">

<div class="tag">🔥 Mais vendido</div>
<div class="tag">⚡ Oferta especial</div>

<div class="old">de R$ 199,00</div>
<div class="new" id="price"></div>

<div class="box">
<h3>🕶️ Produto Premium</h3>
<p>Design moderno estilo urbano</p>
<p>Acabamento premium DH LUPAS</p>
</div>

<div class="box">
<h3>🚚 Envio</h3>
<p>3 a 10 dias úteis</p>
</div>

<div class="box">
<h3>🔒 Segurança</h3>
<p>Compra segura via WhatsApp</p>
</div>

<a id="buy" class="btn">COMPRAR AGORA</a>

</div>

<script>

const p = new URLSearchParams(window.location.search);

const nome = p.get("nome");
const img = p.get("img");

document.getElementById("nome").innerText = nome;

document.getElementById("img").src =
"https://picsum.photos/seed/dh" + img + "/600/400";

let price = 79 + (img % 4) * 17;

document.getElementById("price").innerText =
"R$ " + price.toFixed(2);

document.getElementById("buy").onclick = () => {
window.location.href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent("Quero comprar: " + nome + " por R$ " + price);
};

</script>

</body>
</html>
