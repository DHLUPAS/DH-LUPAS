<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS - Produto</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

header{
background:black;
padding:14px;
font-weight:900;
}

/* IMG */
img{
width:100%;
border-radius:14px;
animation:float 4s infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.price{
font-size:30px;
color:gold;
font-weight:bold;
}

.btn{
display:block;
margin-top:10px;
padding:15px;
background:white;
color:black;
font-weight:bold;
border-radius:10px;
}

.cartBtn{
background:gold;
color:black;
padding:15px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>DH LUPAS</header>

<h2 id="nome"></h2>

<img id="img">

<div class="price" id="price"></div>

<div class="btn" id="buy">COMPRAR AGORA</div>

<div class="cartBtn" onclick="addCart()">ADICIONAR AO CARRINHO</div>

<script>

const p = new URLSearchParams(location.search);

const nome = p.get("nome");
const img = p.get("img");

document.getElementById("nome").innerText = nome;

document.getElementById("img").src =
"https://picsum.photos/seed/dh"+img+"/600/400";

let price = 79 + (img % 4) * 17;

document.getElementById("price").innerText = "R$ "+price;

/* WHATS */
document.getElementById("buy").onclick = ()=>{
window.location.href =
"https://wa.me/5512992440819?text="+
encodeURIComponent("Quero comprar: "+nome+" por R$ "+price);
};

/* CARRINHO */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addCart(){
cart.push({nome,preco:price});
localStorage.setItem("cart", JSON.stringify(cart));
alert("Adicionado!");
}

</script>

</body>
</html>
