<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

header{
background:black;
padding:14px;
border-bottom:1px solid #111;
}

.logo{
font-weight:900;
letter-spacing:4px;
}

/* CONTAINER */
.container{
max-width:600px;
margin:auto;
padding:15px;
animation:fadeIn .8s ease;
}

/* FLUTUAÇÃO */
img{
width:100%;
border-radius:16px;
animation:float 4s ease-in-out infinite;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* PREÇO */
.old{
color:#666;
text-decoration:line-through;
}

.new{
font-size:32px;
font-weight:900;
color:white;
}

/* BOX */
.box{
background:#111;
padding:14px;
border-radius:14px;
margin-top:10px;
text-align:left;
}

/* BOTÃO */
.btn{
display:block;
margin-top:15px;
padding:16px;
background:white;
color:black;
font-weight:bold;
border-radius:12px;
text-decoration:none;
}

/* ANIMAÇÕES */
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<div class="logo">DH LUPAS</div>
</header>

<div class="container">

<h2 id="nome"></h2>

<img id="img">

<div class="old">R$ 199</div>
<div class="new" id="price"></div>

<div class="box">
🕶️ Produto premium DH LUPAS<br>
🚚 Entrega 3 a 10 dias úteis<br>
🔒 Compra segura via WhatsApp
</div>

<a id="buy" class="btn">COMPRAR AGORA</a>

</div>

<script>

const p = new URLSearchParams(window.location.search);

const nome = p.get("nome");
const img = p.get("img");

document.getElementById("nome").innerText = nome;

document.getElementById("img").src =
"https://picsum.photos/seed/dh" + img + "/600/400";

let price = 79 + (img % 4) * 17;

document.getElementById("price").innerText =
"R$ " + price;

document.getElementById("buy").onclick = () => {
window.location.href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent("Quero comprar: " + nome + " por R$ " + price);
};

</script>

</body>
</html>
