<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS - Produto</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="https://dummyimage.com/64x64/000/ffd700&text=DH">

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
overflow-x:hidden;
}

/* HEADER */
header{
background:black;
padding:14px;
border-bottom:1px solid #111;
position:sticky;
top:0;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
letter-spacing:4px;
font-weight:900;
}

.cart{
cursor:pointer;
background:#111;
padding:6px 10px;
border-radius:8px;
}

/* 🔥 CONTADOR ANIMAÇÃO */
.bump{
animation:bump 0.3s ease;
}

@keyframes bump{
0%{transform:scale(1);}
50%{transform:scale(1.4);}
100%{transform:scale(1);}
}

/* CONTAINER */
.container{
max-width:600px;
margin:auto;
padding:15px;
}

/* IMG FLUTUANTE */
.floating-img{
width:100%;
border-radius:16px;
margin-top:10px;
animation:float 4s ease-in-out infinite;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* TAGS */
.tag{
display:inline-block;
padding:6px 12px;
background:#1a1a1a;
border-radius:20px;
font-size:12px;
color:#aaa;
margin:6px 4px;
}

/* PREÇO */
.old{
color:#666;
text-decoration:line-through;
font-size:15px;
}

.new{
font-size:34px;
font-weight:900;
color:white;
margin:5px 0;
}

/* BOX */
.box{
background:#111;
padding:14px;
border-radius:14px;
margin-top:12px;
text-align:left;
font-size:13px;
}

/* BOTÃO */
.btn{
display:block;
margin-top:18px;
padding:16px;
background:white;
color:black;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

/* CARRINHO */
#cartBox{
position:fixed;
top:60px;
right:10px;
background:#111;
padding:15px;
border-radius:12px;
width:250px;
display:none;
z-index:9999;
text-align:left;
}

.item{
font-size:13px;
margin-bottom:8px;
border-bottom:1px solid #222;
padding-bottom:5px;
position:relative;
}

.removeBtn{
position:absolute;
right:0;
top:0;
cursor:pointer;
color:red;
font-weight:bold;
}

.oldPrice{
text-decoration:line-through;
color:#777;
font-size:12px;
}

.discount{
color:gold;
font-weight:bold;
}

.totalBox{
margin-top:10px;
border-top:1px solid #333;
padding-top:10px;
}

.finalBtn{
margin-top:10px;
background:gold;
color:black;
padding:10px;
border-radius:8px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

/* 🔥 ANIMAÇÃO VOAR */
.fly-img{
position:fixed;
z-index:99999;
width:80px;
height:60px;
object-fit:cover;
border-radius:10px;
pointer-events:none;
transition:all 0.8s cubic-bezier(.2,.8,.2,1);
}

/* ANIMAÇÃO FLUTUAR */
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<div class="logo">DH LUPAS</div>
<div class="cart" onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>
</header>

<!-- 🔊 SOM -->
<audio id="cartSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- CARRINHO -->
<div id="cartBox">
<h3>Seu Carrinho</h3>
<div id="cartItems"></div>

<div class="totalBox">
Total: R$ <span id="total">0</span>
</div>

<div class="finalBtn" onclick="finalizarCompra()">
🔥 COMPRAR AGORA (CARRINHO)
</div>
</div>

<div class="container">

<h2 id="nome"></h2>

<img id="img" class="floating-img">

<div class="tag">🔥 Mais vendido</div>
<div class="tag">⚡ Oferta especial</div>

<div class="old">de R$ 199,00</div>
<div class="new" id="price"></div>

<div class="box">
🕶️ Produto premium DH LUPAS<br>
🚚 Entrega 3 a 10 dias úteis<br>
🔒 Compra segura via WhatsApp
</div>

<a id="buy" class="btn">COMPRAR AGORA</a>

<div class="btn" style="margin-top:10px;background:gold;" onclick="addCart()">
ADICIONAR AO CARRINHO
</div>

</div>

<script>

const p = new URLSearchParams(window.location.search);

const nome = p.get("nome");
const img = p.get("img");

document.getElementById("nome").innerText = nome;

document.getElementById("img").src =
"https://picsum.photos/seed/dh" + img + "/600/400";

let price = 79 + (img % 4) * 17;

document.getElementById("price").innerText =
"R$ " + price.toFixed(2);

/* WHATS */
document.getElementById("buy").onclick = () => {
window.location.href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent("Quero comprar: " + nome + " por R$ " + price);
};

/* CARRINHO */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addCart(){
cart.push({nome, preco:price});
localStorage.setItem("cart", JSON.stringify(cart));
updateCart();
alert("Adicionado ao carrinho!");

flyToCart();

/* 🔊 SOM */
document.getElementById("cartSound").play();

/* 🔥 CONTADOR PULANDO */
let count = document.getElementById("cartCount");
count.classList.add("bump");
setTimeout(()=>count.classList.remove("bump"),300);
}

function removeItem(index){
cart.splice(index,1);
localStorage.setItem("cart", JSON.stringify(cart));
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText = cart.length;

let box = document.getElementById("cartItems");
box.innerHTML = "";

let desconto = cart.length >= 2 ? 0.10 : 0;

let total = 0;

cart.forEach((item,i)=>{

let final = item.preco - (item.preco * desconto);
total += final;

box.innerHTML += `
<div class="item">
<span class="removeBtn" onclick="removeItem(${i})">✖</span>
${item.nome}<br>
<span class="oldPrice">R$ ${item.preco.toFixed(2)}</span><br>
<span class="discount">R$ ${final.toFixed(2)}</span>
</div>
`;
});

document.getElementById("total").innerText = total.toFixed(2);
}

function toggleCart(){
let box = document.getElementById("cartBox");
box.style.display = box.style.display === "block" ? "none" : "block";
}

function finalizarCompra(){

let msg = "🔥 Carrinho:\n";
let desconto = cart.length >= 2 ? 0.10 : 0;

cart.forEach(item=>{
let final = item.preco - (item.preco * desconto);
msg += `${item.nome} - R$ ${final.toFixed(2)}\n`;
});

window.location.href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent(msg);
}

updateCart();

/* 🔥 VOAR PRO CARRINHO */
function flyToCart(){

let img = document.getElementById("img");
let cartIcon = document.querySelector(".cart");

let imgRect = img.getBoundingClientRect();
let cartRect = cartIcon.getBoundingClientRect();

let clone = img.cloneNode(true);
clone.classList.add("fly-img");

clone.style.top = imgRect.top + "px";
clone.style.left = imgRect.left + "px";
clone.style.width = imgRect.width + "px";
clone.style.height = imgRect.height + "px";

document.body.appendChild(clone);

setTimeout(()=>{
clone.style.top = cartRect.top + "px";
clone.style.left = cartRect.left + "px";
clone.style.width = "30px";
clone.style.height = "30px";
clone.style.opacity = "0.5";
},10);

setTimeout(()=>{
clone.remove();
},800);

}
</script>

</body>
</html>
