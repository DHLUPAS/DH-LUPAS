<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS - Produto</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

/* HEADER */
header{
background:black;
padding:20px;
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
letter-spacing:3px;
font-weight:bold;
animation:fadeDown 0.8s ease;
}

/* CONTAINER */
.container{
max-width:700px;
margin:auto;
padding:20px;
animation:fadeUp 0.8s ease;
}

img{
width:100%;
border-radius:12px;
margin-top:10px;
}

/* TAGS */
.tag{
display:inline-block;
padding:5px 10px;
background:#222;
border-radius:6px;
font-size:12px;
color:#aaa;
margin:5px 3px;
}

/* SELLO */
.selo{
background:gold;
color:black;
display:inline-block;
padding:6px 12px;
border-radius:6px;
font-weight:bold;
margin-top:10px;
}

/* ESTOQUE */
.estoque{
color:#ff4d4d;
font-weight:bold;
margin-top:10px;
}

/* PREÇOS */
.old{
color:#777;
text-decoration:line-through;
margin-top:10px;
font-size:18px;
}

.new{
color:gold;
font-size:34px;
font-weight:bold;
margin:5px 0;
}

/* BOX */
.box{
background:#141414;
padding:15px;
border-radius:10px;
margin-top:15px;
text-align:left;
}

/* BOTÃO */
.btn{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:gold;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* ANIMAÇÕES */
@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<div class="logo">DH LUPAS</div>
</header>

<div class="container">

<h1 id="nome"></h1>

<img id="img">

<div class="selo" id="selo"></div>

<div class="tag">🔥 Mais vendido</div>
<div class="tag">⚡ Oferta especial</div>

<div class="estoque" id="estoque"></div>

<div class="old">de R$ 199,00</div>
<div class="new" id="price"></div>

<div class="box">
<h3>🕶️ Detalhes</h3>
<p>Óculos premium DH LUPAS</p>
<p>Estilo moderno e urbano</p>
<p>Conforto e presença no visual</p>
</div>

<a id="whats" class="btn">Comprar no WhatsApp</a>

</div>

<script>

const p = new URLSearchParams(window.location.search);

const nome = p.get("nome");
const img = p.get("img");

document.getElementById("nome").innerText = nome;

document.getElementById("img").src =
"https://picsum.photos/seed/dh" + img + "/600/400";

/* PREÇO DINÂMICO */
let base = 199;
let price = 79 + (img % 4) * 15;

/* ESTOQUE SIMULADO */
let estoque = 3 + (img % 4);

/* SELLO AUTOMÁTICO */
document.getElementById("selo").innerText =
img % 2 === 0 ? "🔥 MAIS VENDIDO" : "💎 PREMIUM";

/* TEXTO ESTOQUE */
document.getElementById("estoque").innerText =
"⚠ Últimas unidades: " + estoque;

/* PREÇO */
document.getElementById("price").innerText =
"por R$ " + price.toFixed(2);

/* WHATSAPP */
document.getElementById("whats").href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent(
"Quero comprar: " + nome +
" | De R$199 por R$" + price.toFixed(2) +
" | Últimas unidades: " + estoque
);

</script>

</body>
</html>
