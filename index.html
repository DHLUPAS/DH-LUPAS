<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS</title>

<!-- FAVICON (aba do navegador) -->
<link rel="icon" type="image/png" href="https://dummyimage.com/64x64/000/fff&text=DH">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0a0a0a;
color:white;
}

/* HEADER */
header{
background:black;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
}

/* LOGO TEXTO */
.logo{
font-size:22px;
font-weight:bold;
letter-spacing:3px;
}

/* NAV */
nav a{
color:#aaa;
margin:0 10px;
text-decoration:none;
font-size:14px;
}

nav a:hover{
color:gold;
}

/* HERO */
.hero{
height:300px;
background:url('https://picsum.photos/1200/700?blur=2') center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
font-size:26px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding:20px;
}

/* CARD */
.card{
background:#141414;
border-radius:12px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 20px rgba(255,215,0,0.1);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:15px;
}

.card p{
margin:0 10px 10px;
color:#aaa;
font-size:12px;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
color:#666;
border-top:1px solid #222;
margin-top:40px;
}

/* RESPONSIVO */
@media(max-width:700px){
header{flex-direction:column;gap:10px;}
}
</style>
</head>

<body>

<header>
<div class="logo">DH LUPAS</div>

<nav>
<a href="#">Home</a>
<a href="#">Coleção</a>
<a href="#">Contato</a>
</nav>
</header>

<div class="hero">
<h1>ESTILO,ATITUDE,PRESENÇA.</h1>
</div>

<section class="grid" id="grid"></section>

<footer>
© DH LUPAS - Todos os direitos reservados
</footer>

<script>

const produtos = [
"Juliet Chrome","Juliet Black","Juliet Gold","Juliet Azul",
"Juliet Vermelha","Juliet Prata","Juliet Dark","Juliet Ice",
"Juliet Neon","Juliet Smoke","Juliet Polarizada","Juliet X",
"Juliet Pro","Juliet Street","Juliet Elite","Juliet Vision"
];

const grid = document.getElementById("grid");

produtos.forEach((nome,i)=>{

grid.innerHTML += `
<a href="produto.html?nome=${encodeURIComponent(nome)}&desc=Óculos DH LUPAS premium&img=${i}">
<div class="card">
<img src="https://picsum.photos/seed/dh${i}/600/400">
<h3>${nome}</h3>
<p>Estilo premium e moderno</p>
</div>
</a>
`;

});

</script>

</body>
</html>
