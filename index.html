<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Platini Lupas</title>

<style>
/* =========================
   RESET
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* =========================
   HEADER
========================= */
header {
  background: #000;
  padding: 25px;
  text-align: center;
  border-bottom: 1px solid #222;
}

header h1 {
  font-size: 32px;
  letter-spacing: 3px;
}

header p {
  color: #aaa;
  margin-top: 8px;
}

/* =========================
   BANNER
========================= */
.banner {
  height: 260px;
  background: url('https://picsum.photos/1200/500?blur=2') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.banner h2 {
  font-size: 34px;
  background: rgba(0,0,0,0.6);
  padding: 15px 25px;
  border-radius: 10px;
}

/* =========================
   SEÇÕES
========================= */
.section-title {
  padding: 20px;
  font-size: 20px;
  color: gold;
}

/* =========================
   GRID
========================= */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 18px;
  padding: 20px;
}

/* =========================
   CARD
========================= */
.card-link {
  text-decoration: none;
  color: inherit;
}

.card {
  background: #141414;
  border-radius: 12px;
  overflow: hidden;
  transition: 0.3s;
  position: relative;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 20px rgba(255,215,0,0.08);
}

.card img {
  width: 100%;
  height: 190px;
  object-fit: cover;
}

.card h3 {
  font-size: 15px;
  margin: 10px;
}

.card p {
  font-size: 12px;
  color: #aaa;
  margin: 0 10px 10px;
}

.price {
  margin: 0 10px 15px;
  color: gold;
  font-weight: bold;
}

/* badge */
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: gold;
  color: black;
  padding: 4px 8px;
  font-size: 11px;
  border-radius: 6px;
}

/* =========================
   FOOTER
========================= */
footer {
  text-align: center;
  padding: 30px;
  color: #666;
  border-top: 1px solid #222;
  margin-top: 40px;
}

/* =========================
   RESPONSIVO
========================= */
@media(max-width:600px){
  header h1 { font-size: 24px; }
  .banner h2 { font-size: 20px; }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>🕶️ PLATINI LUPAS</h1>
  <p>Estilo, presença e performance</p>
</header>

<!-- BANNER -->
<div class="banner">
  <h2>COLEÇÃO JULIET PREMIUM</h2>
</div>

<!-- MAIS VENDIDOS -->
<h2 class="section-title">🔥 Mais Vendidos</h2>
<section class="grid" id="grid1"></section>

<!-- OFERTAS -->
<h2 class="section-title">💸 Ofertas Especiais</h2>
<section class="grid" id="grid2"></section>

<!-- NOVOS -->
<h2 class="section-title">🆕 Novidades</h2>
<section class="grid" id="grid3"></section>

<!-- FOOTER -->
<footer>
  © 2026 Platini Lupas - Todos os direitos reservados
</footer>

<script>
const produtos = [
  "Juliet Chrome","Juliet Black","Juliet Gold","Juliet Azul",
  "Juliet Vermelha","Juliet Prata","Juliet Dark","Juliet Ice",
  "Juliet Neon","Juliet Smoke","Juliet Polarizada","Juliet X",
  "Juliet Pro","Juliet Street","Juliet Elite","Juliet Vision",
  "Juliet Max","Juliet Classic","Juliet Braba","Juliet Top"
];

function gerar(gridId, tipo){
  const grid = document.getElementById(gridId);

  produtos.forEach((nome, i) => {

    let preco = 199;

    // lógica inteligente de preço
    if(tipo === "oferta"){
      preco = 79 + (i % 3) * 10;
    }
    else if(tipo === "novo"){
      preco = 120 + (i % 2) * 30;
    }
    else {
      preco = 150 + (i % 4) * 20;
    }

    const badge = (i % 4 === 0) ? `<div class="badge">🔥</div>` : "";

    grid.innerHTML += `
      <a class="card-link" href="produto.html?nome=${encodeURIComponent(nome)}&desc=Óculos estilo premium Juliet&img=${i}&preco=${preco}">
        <div class="card">
          ${badge}
          <img src="https://picsum.photos/seed/juliet${i}/600/400">
          <h3>${nome}</h3>
          <p>Estilo premium e presença forte</p>
          <div class="price">R$ ${preco}</div>
        </div>
      </a>
    `;
  });
}

gerar("grid1","normal");
gerar("grid2","oferta");
gerar("grid3","novo");
</script>

</body>
</html>
