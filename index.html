<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* HEADER */
header{
background:black;
padding:14px;
text-align:center;
font-weight:900;
letter-spacing:3px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border-radius:12px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
font-size:13px;
margin:8px;
}

/* CARRINHO */
.cartBtn{
position:fixed;
top:15px;
right:15px;
background:#111;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}

#cartBox{
display:none;
position:fixed;
top:60px;
right:10px;
background:#111;
padding:15px;
width:260px;
border-radius:12px;
z-index:9999;
}

</style>
</head>

<body>

<header>DH LUPAS</header>

<div class="cartBtn" onclick="toggleCart()">
🛒 <span id="cartCount">0</span>
</div>

<div id="cartBox">
<h3>Carrinho</h3>
<div id="cartItems"></div>

<div style="margin-top:10px;border-top:1px solid #333;padding-top:10px;">
Total: R$ <span id="total">0</span>
</div>

<div onclick="finalizarCompra()"
style="margin-top:10px;background:gold;color:black;padding:10px;border-radius:8px;font-weight:bold;text-align:center;cursor:pointer;">
🔥 Comprar Agora
</div>
</div>

<div class="grid" id="grid"></div>

<script>

/* PRODUTOS MOCK */
const produtos = [
"Juliet Chrome","Juliet Black","Juliet Gold","Juliet Azul"
];

const grid = document.getElementById("grid");

produtos.forEach((nome,i)=>{

grid.innerHTML += `
<div class="card"
onclick="location.href='produto.html?nome=${nome}&img=${i}'">
<img src="https://picsum.photos/seed/dh${i}/600/400">
<h3>${nome}</h3>
</div>
`;

});

/* CARRINHO */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function toggleCart(){
let box = document.getElementById("cartBox");
box.style.display = box.style.display === "block" ? "none" : "block";
}

function updateCart(){

document.getElementById("cartCount").innerText = cart.length;

let box = document.getElementById("cartItems");
box.innerHTML = "";

let total = 0;
let desconto = cart.length >= 2 ? 0.10 : 0;

cart.forEach(item=>{
let final = item.preco - (item.preco * desconto);
total += final;

box.innerHTML += `
<div style="font-size:13px;margin-bottom:8px;">
${item.nome}<br>
R$ ${final.toFixed(2)}
</div>
`;
});

document.getElementById("total").innerText = total.toFixed(2);
}

function finalizarCompra(){

let msg = "🔥 Pedido:\n";

let desconto = cart.length >= 2 ? 0.10 : 0;

cart.forEach(item=>{
let final = item.preco - (item.preco * desconto);
msg += `${item.nome} - R$ ${final.toFixed(2)}\n`;
});

window.location.href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent(msg);
}

updateCart();

</script>

</body>
</html>
