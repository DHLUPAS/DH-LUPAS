<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Platini Lupas</title>

<style>

/* =========================
   BASE
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* =========================
   HEADER
========================= */

header{
background:black;
padding:30px;
text-align:center;
border-bottom:1px solid #222;
}

header h1{
font-size:34px;
letter-spacing:3px;
}

header p{
color:#aaa;
margin-top:8px;
}

/* =========================
   HERO
========================= */

.hero{
height:300px;
background:url('https://picsum.photos/1200/600') center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h2{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
}

/* =========================
   GRID
========================= */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

/* =========================
   CARD
========================= */

.card-link{
text-decoration:none;
color:white;
}

.card{
background:#141414;
border-radius:12px;
overflow:hidden;
transition:.3s;
position:relative;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 20px rgba(255,215,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:15px;
}

.card p{
margin:0 10px 10px;
font-size:12px;
color:#aaa;
}

.price{
margin:0 10px 15px;
color:gold;
font-weight:bold;
}

/* badge */
.badge{
position:absolute;
top:10px;
left:10px;
background:gold;
color:black;
font-size:11px;
padding:4px 8px;
border-radius:6px;
}

/* footer */
footer{
text-align:center;
padding:30px;
color:#666;
border-top:1px solid #222;
margin-top:40px;
}

/* responsivo */
@media(max-width:600px){
header h1{font-size:24px;}
.hero h2{font-size:18px;}
}

</style>

</head>

<body>

<header>
<h1>🕶️ PLATINI LUPAS</h1>
<p>Estilo. Presença. Atitude.</p>
</header>

<div class="hero">
<h2>COLEÇÃO JULIET PREMIUM 2026</h2>
</div>

<h2 style="padding:20px;color:gold;">🔥 Produtos em destaque</h2>

<section class="grid" id="grid"></section>

<footer>
© Platini Lupas - Todos os direitos reservados
</footer>

<script>

/* =========================
   PRODUTOS
========================= */

const produtos = [
"Juliet Chrome","Juliet Black","Juliet Gold","Juliet Azul",
"Juliet Vermelha","Juliet Prata","Juliet Dark","Juliet Ice",
"Juliet Neon","Juliet Smoke","Juliet Polarizada","Juliet X",
"Juliet Pro","Juliet Street","Juliet Elite","Juliet Vision",
"Juliet Max","Juliet Classic","Juliet Braba","Juliet Top",
"Juliet Ultra","Juliet Night","Juliet Fire","Juliet Sky",
"Juliet Ocean"
];

/* =========================
   PREÇOS FIXOS (IMPORTANTE)
========================= */

function precoFixo(i){
if(i % 6 === 0) return 79;
if(i % 5 === 0) return 99;
if(i % 4 === 0) return 129;
if(i % 3 === 0) return 149;
if(i % 2 === 0) return 169;
return 199;
}

/* =========================
   RENDER
========================= */

const grid = document.getElementById("grid");

produtos.forEach((nome,i)=>{

let preco = precoFixo(i);

let badge = (i % 4 === 0)
? `<div class="badge">🔥 OFERTA</div>`
: "";

grid.innerHTML += `
<a class="card-link"
href="produto.html?nome=${encodeURIComponent(nome)}&desc=Óculos Juliet premium&img=${i}&preco=${preco}">

<div class="card">
${badge}
<img src="https://picsum.photos/seed/juliet${i}/600/400">
<h3>${nome}</h3>
<p>Design premium e estilo forte</p>
<div class="price">R$ ${preco}</div>
</div>

</a>
`;

});

</script>

</body>
</html>
