<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS</title>

<link rel="icon" type="image/png" href="https://dummyimage.com/64x64/000/fff&text=DH">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
scroll-behavior:smooth;
}

body{
background:#0a0a0a;
color:white;
}

/* HEADER */
header{
background:black;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
letter-spacing:3px;
font-weight:bold;
animation:fadeDown 1s ease;
}

/* MENU */
nav a{
color:#aaa;
margin:0 10px;
text-decoration:none;
}

nav a:hover{
color:gold;
}

/* HERO */
.hero{
height:300px;
background:url('https://picsum.photos/1200/700?blur=2') center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
animation:fadeIn 1.5s ease;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding:20px;
}

/* CARD */
.card{
background:#141414;
border-radius:12px;
overflow:hidden;
transition:.3s;
animation:fadeUp 0.6s ease;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 20px rgba(255,215,0,0.1);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
}

.card h3{
margin:10px;
}

.card p{
margin:0 10px 10px;
color:#aaa;
}

/* BOTÃO */
.btn{
display:block;
margin:10px;
padding:8px;
background:gold;
color:black;
text-align:center;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* CARRINHO */
.cart{
position:fixed;
right:20px;
bottom:20px;
background:#111;
padding:15px;
border-radius:10px;
width:250px;
border:1px solid #333;
}

.cart h3{
color:gold;
margin-bottom:10px;
}

.cart-item{
font-size:12px;
margin:5px 0;
color:#ccc;
}

.total{
margin-top:10px;
font-weight:bold;
}

/* BOTÃO WHATS */
.whats{
display:block;
margin-top:10px;
padding:8px;
background:gold;
color:black;
text-align:center;
border-radius:6px;
text-decoration:none;
}

/* ANIMAÇÕES */
@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<header>
<div class="logo">DH LUPAS</div>

<nav>
<a href="#topo">Home</a>
<a href="#colecao">Coleção</a>
<a href="#contato">Contato</a>
</nav>
</header>

<div class="hero">
<h1>ESTILO. ATITUDE. PRESENÇA.</h1>
</div>

<section class="grid" id="colecao"></section>

<!-- CARRINHO -->
<div class="cart">
<h3>🛒 Carrinho</h3>
<div id="cartItems"></div>
<div class="total">Total: R$ <span id="total">0</span></div>

<a class="whats" id="buyBtn">Finalizar no WhatsApp</a>
</div>

<script>

const produtos = [
"Juliet Chrome","Juliet Black","Juliet Gold","Juliet Azul",
"Juliet Vermelha","Juliet Prata","Juliet Dark","Juliet Ice"
];

let cart = [];

function renderCart(){
let total = 0;
let html = "";

cart.forEach(item=>{
html += `<div class="cart-item">${item.nome} - R$ ${item.preco}</div>`;
total += item.preco;
});

document.getElementById("cartItems").innerHTML = html;
document.getElementById("total").innerText = total;

document.getElementById("buyBtn").href =
"https://wa.me/5512992440819?text=" +
encodeURIComponent(
"Quero comprar: " +
cart.map(i=>i.nome + " (R$ " + i.preco + ")").join(", ") +
" Total: R$ " + total
);
}

const grid = document.getElementById("colecao");

produtos.forEach((nome,i)=>{

let preco = 99 + (i % 5) * 20;

grid.innerHTML += `
<div class="card">
<img src="https://picsum.photos/seed/dh${i}/600/400">
<h3>${nome}</h3>
<p>Óculos premium DH LUPAS</p>

<div class="btn" onclick="addToCart('${nome}',${preco})">
Adicionar ao carrinho
</div>
</div>
`;

});

function addToCart(nome,preco){
cart.push({nome,preco});
renderCart();
}

</script>

</body>
</html>
