<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Platini Lupas</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0a0a0a;
color:white;
}

/* TOP BAR */
header{
background:black;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

nav a{
color:#aaa;
margin:0 10px;
text-decoration:none;
font-size:14px;
}

nav a:hover{
color:gold;
}

/* HERO */
.hero{
height:320px;
background:url('https://picsum.photos/1200/700?blur=2') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
font-size:28px;
}

/* SEÇÕES */
.section-title{
padding:20px;
color:gold;
font-size:18px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding:20px;
}

/* CARD */
.card{
background:#141414;
border-radius:12px;
overflow:hidden;
transition:.3s;
position:relative;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 20px rgba(255,215,0,0.1);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:15px;
}

.card p{
margin:0 10px 10px;
color:#aaa;
font-size:12px;
}

.price{
margin:0 10px 15px;
color:gold;
font-weight:bold;
}

/* badge */
.badge{
position:absolute;
top:10px;
left:10px;
background:gold;
color:black;
padding:4px 8px;
font-size:11px;
border-radius:6px;
}

/* destaque */
.featured{
display:flex;
padding:20px;
gap:20px;
}

.featured img{
width:50%;
border-radius:12px;
}

.featured-text{
flex:1;
}

.featured-text h2{
color:gold;
margin-bottom:10px;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:gold;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

/* footer */
footer{
text-align:center;
padding:30px;
color:#666;
border-top:1px solid #222;
margin-top:40px;
}

/* mobile */
@media(max-width:700px){
.featured{
flex-direction:column;
}
.featured img{
width:100%;
}
}
</style>

</head>

<body>

<header>
<div class="logo">🕶️ PLATINI LUPAS</div>

<nav>
<a href="#">Home</a>
<a href="#">Ofertas</a>
<a href="#">Mais Vendidos</a>
<a href="#">Novidades</a>
</nav>
</header>

<div class="hero">
<h1>ESTILO. PRESENÇA. ATITUDE.</h1>
</div>

<!-- DESTAQUE -->
<div class="featured">
<img src="https://picsum.photos/600/500?random=1">
<div class="featured-text">
<h2>Juliet Chrome Premium</h2>
<p>O modelo mais procurado da coleção. Design moderno, lente espelhada e presença forte em qualquer lugar.</p>
<a class="btn" href="#">Ver produto</a>
</div>
</div>

<!-- PRODUTOS -->
<h2 class="section-title">🔥 Coleção Principal</h2>
<section class="grid" id="grid"></section>

<footer>
© 2026 Platini Lupas - Todos os direitos reservados
</footer>

<script>

const produtos = [
"Juliet Chrome","Juliet Black","Juliet Gold","Juliet Azul",
"Juliet Vermelha","Juliet Prata","Juliet Dark","Juliet Ice",
"Juliet Neon","Juliet Smoke","Juliet Polarizada","Juliet X",
"Juliet Pro","Juliet Street","Juliet Elite","Juliet Vision"
];

function preco(i){
if(i % 5 === 0) return 79;
if(i % 4 === 0) return 99;
if(i % 3 === 0) return 129;
if(i % 2 === 0) return 149;
return 179;
}

const grid = document.getElementById("grid");

produtos.forEach((nome,i)=>{

let p = preco(i);
let badge = i % 3 === 0 ? `<div class="badge">🔥</div>` : "";

grid.innerHTML += `
<a href="produto.html?nome=${encodeURIComponent(nome)}&desc=Óculos premium Juliet&img=${i}&preco=${p}">
<div class="card">
${badge}
<img src="https://picsum.photos/seed/juliet${i}/600/400">
<h3>${nome}</h3>
<p>Estilo premium e moderno</p>
<div class="price">R$ ${p}</div>
</div>
</a>
`;

});

</script>

</body>
</html>
