<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS</title>

<link rel="icon" href="https://dummyimage.com/64x64/000/fff&text=DH">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0a0a0a;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
letter-spacing:3px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding:20px;
}

.card{
background:#141414;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 20px rgba(255,215,0,0.1);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:15px;
}

.card p{
margin:0 10px 10px;
color:#aaa;
font-size:12px;
}
</style>
</head>

<body>

<header>
<div class="logo">DH LUPAS</div>
</header>

<section class="grid" id="grid"></section>

<script>

const produtos = [
"Juliet Chrome","Juliet Black","Juliet Gold","Juliet Azul",
"Juliet Vermelha","Juliet Prata","Juliet Dark","Juliet Ice",
"Juliet Neon","Juliet Smoke"
];

const grid = document.getElementById("grid");

produtos.forEach((nome,i)=>{

grid.innerHTML += `
<div class="card"
onclick="window.location.href='produto.html?nome=${encodeURIComponent(nome)}&img=${i}'">

<img src="https://picsum.photos/seed/dh${i}/600/400">
<h3>${nome}</h3>
<p>Clique para ver detalhes</p>

</div>
`;

});

</script>

</body>
</html>
