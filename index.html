<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS</title>

<link rel="icon" href="https://dummyimage.com/64x64/000/fff&text=DH">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
scroll-behavior:smooth;
}

body{
background:#0a0a0a;
color:white;
padding-top:80px;
}

/* HEADER FIXO + ANIMAÇÃO */
header{
background:black;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;

/* animação inicial */
animation:fadeDown 0.8s ease;
}

/* LOGO BRILHO */
.logo{
font-size:22px;
letter-spacing:3px;
font-weight:bold;
color:white;
animation:glow 2.5s infinite alternate;
}

/* MENU */
nav a{
color:#aaa;
margin:0 10px;
text-decoration:none;
transition:.3s;
}

nav a:hover{
color:gold;
}

/* HERO */
.hero{
height:300px;
background:url('https://picsum.photos/1200/700?blur=2') center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
animation:fadeIn 1.2s ease;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding:20px;
}

.card{
background:#141414;
border-radius:12px;
overflow:hidden;
transition:.3s;
cursor:pointer;
animation:fadeUp 0.6s ease;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 20px rgba(255,215,0,0.1);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
}

.card h3{
margin:10px;
}

.card p{
margin:0 10px 10px;
color:#aaa;
font-size:12px;
}

/* CONTATO */
#contato{
padding:40px;
text-align:center;
background:#111;
}

#contato a{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:gold;
color:black;
text-decoration:none;
border-radius:8px;
}

/* BOTÃO VOLTAR AO TOPO */
.top-btn{
position:fixed;
bottom:20px;
right:20px;
background:gold;
color:black;
padding:10px 14px;
border-radius:50%;
font-weight:bold;
cursor:pointer;
display:none;
}

/* ANIMAÇÕES */
@keyframes fadeDown{
from{opacity:0;transform:translateY(-20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@keyframes glow{
0%{text-shadow:0 0 5px gold;}
100%{text-shadow:0 0 20px gold;}
}
</style>
</head>

<body>

<header>
<div class="logo">DH LUPAS</div>

<nav>
<a href="#topo">Home</a>
<a href="#colecao">Coleção</a>
<a href="#contato">Contato</a>
</nav>
</header>

<div class="hero" id="topo">
<h1>ESTILO. ATITUDE. PRESENÇA.</h1>
</div>

<section class="grid" id="colecao"></section>

<section id="contato">
<h2 style="color:gold;">Contato</h2>
<p>Fale conosco pelo WhatsApp</p>

<a href="https://wa.me/5512992440819">
Abrir WhatsApp
</a>
</section>

<footer style="text-align:center;padding:30px;color:#666;">
© DH LUPAS
</footer>

<!-- BOTÃO VOLTAR AO TOPO -->
<div class="top-btn" id="topBtn">↑</div>

<script>

/* PRODUTOS */
const produtos = [
"Juliet Chrome","Juliet Black","Juliet Gold","Juliet Azul",
"Juliet Vermelha","Juliet Prata","Juliet Dark","Juliet Ice",
"Juliet Neon","Juliet Smoke"
];

const grid = document.getElementById("colecao");

produtos.forEach((nome,i)=>{

grid.innerHTML += `
<div class="card"
onclick="window.location.href='produto.html?nome=${encodeURIComponent(nome)}&img=${i}'">

<img src="https://picsum.photos/seed/dh${i}/600/400">
<h3>${nome}</h3>
<p>Clique para ver produto</p>

</div>
`;

});

/* BOTÃO VOLTAR AO TOPO */
const btn = document.getElementById("topBtn");

window.onscroll = () => {
btn.style.display = window.scrollY > 300 ? "block" : "none";
};

btn.onclick = () => {
window.scrollTo({top:0, behavior:"smooth"});
};

</script>

</body>
</html>
