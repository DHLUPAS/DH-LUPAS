<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Platini Lupas</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HEADER PREMIUM */
header {
  padding: 30px 20px;
  text-align: center;
  background: black;
  border-bottom: 1px solid #222;
}

header h1 {
  margin: 0;
  font-size: 30px;
  letter-spacing: 3px;
}

header p {
  margin-top: 8px;
  color: #aaa;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD PREMIUM */
.card-link {
  text-decoration: none;
  color: inherit;
}

.card {
  background: #121212;
  border-radius: 14px;
  overflow: hidden;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 15px 25px rgba(255,215,0,0.08);
}

/* imagem */
.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* conteúdo */
.card h3 {
  margin: 10px;
  font-size: 16px;
}

.card p {
  margin: 0 10px 10px;
  color: #aaa;
  font-size: 13px;
}

/* preço estilo loja */
.price {
  margin: 0 10px 15px;
  font-weight: bold;
  color: gold;
}

/* badge */
.badge {
  position: absolute;
  background: gold;
  color: black;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 6px;
  margin: 10px;
}
</style>
</head>

<body>

<header>
  <h1>🕶️ PLATINI LUPAS</h1>
  <p>Performance. Estilo. Presença.</p>
</header>

<section class="grid" id="grid"></section>

<script>
const produtos = [
  {nome:"Juliet Chrome", desc:"Lente espelhada premium"},
  {nome:"Juliet Black", desc:"Discreta e elegante"},
  {nome:"Juliet Gold", desc:"Visual forte e chamativo"},
  {nome:"Juliet Azul", desc:"Estilo moderno"},
  {nome:"Juliet Vermelha", desc:"Estilo agressivo"},
  {nome:"Juliet Prata", desc:"Clássica"},
  {nome:"Juliet Dark", desc:"Escura premium"},
  {nome:"Juliet Ice", desc:"Leve e clean"},
  {nome:"Juliet Neon", desc:"Alta visibilidade"},
  {nome:"Juliet Smoke", desc:"Fumê confortável"}
];

const grid = document.getElementById("grid");

produtos.forEach((p, i) => {

  const preco = 80 + (i % 3) * 30;

  const badge = i % 4 === 0 ? `<div class="badge">🔥 OFERTA</div>` : "";

  grid.innerHTML += `
    <a class="card-link" href="produto.html?nome=${encodeURIComponent(p.nome)}&desc=${encodeURIComponent(p.desc)}&img=${i}&preco=${preco}">
      <div class="card">
        ${badge}
        <img src="https://picsum.photos/seed/juliet${i}/600/400">
        <h3>${p.nome}</h3>
        <p>${p.desc}</p>
        <div class="price">R$ ${preco}</div>
      </div>
    </a>
  `;
});
</script>

</body>
</html>
